<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./fontawesome/css/all.min.css">
    <link rel="stylesheet" href="./zingmp3/zingmp3.css" />
    <title>Mp3-copy</title>
</head>
<body>
    <div id="home">
        <div id="left-bar">
            <i id="icon-zing"></i>
            <div id="infomation">
                <div id="part-1">
                    <div id="ca-nhan">
                        <i class="fa-solid fa-play play-left-bar"></i>
                        <h4>Cá Nhân <i class="fa-regular fa-circle-play"></i></h4>
                    </div>
                    <div id="kham-pha">
                        <i class="fa-regular fa-circle"></i>
                        <h4>khám Phá <i class="fa-regular fa-circle-play"></i></h4>
                    </div>
                    <div id="zing-chart">
                        <i class="fa-solid fa-chart-line"></i>
                        <h4>#zingchart <i class="fa-regular fa-circle-play"></i></h4>
                    </div>
                    <div id="radio">
                        <i class="fa-solid fa-compact-disc"></i>
                        <h4>Radio <i class="fa-regular fa-circle-play"></i></h4>
                    </div>
                    <div id="theo-doi">
                        <i class="fa-solid fa-newspaper"></i>
                        <h4>Theo Dõi <i class="fa-regular fa-circle-play"></i></h4>
                    </div>
                </div>
                <div id="part-2">
                    <div id="nhac-moi">
                        <i class="fa-solid fa-music"></i>
                        <h4>Nhạc Mới <i class="fa-regular fa-circle-play"></i></h4>
                    </div>
                    <div id="the-loai">
                        <i class="fa-solid fa-icons"></i>
                        <h4>Thể Loại <i class="fa-regular fa-circle-play"></i></h4>
                    </div>
                    <div id="top-100">
                        <i class="fa-regular fa-star"></i>
                        <h4>Top 100 <i class="fa-regular fa-circle-play"></i></h4>
                    </div>
                    <div id="mv">
                        <i class="fa-solid fa-file-audio"></i>
                        <h4>MV <i class="fa-regular fa-circle-play"></i></h4>
                    </div>
                    <div id="vip"></div>
                </div>
                <div id="part-3">
                    <i class="fa-solid fa-plus"></i>
                    <h4>Tạo playlist mới</h4>
                </div>
            </div>
        </div>
        <div id="right-bar">
            <div id="part-1">
                <div class="image" id="image-1"></div>
                <div class="image" id="image-2"></div>
                <div class="image" id="image-3"></div>
            </div>
            <div id="part-2">
                <h3>Gần Đây</h3>
                <div class="square" id="edm"><h4>Top 100 Nhạc EDM</h4></div>
                <div class="square" id="edm-viet"><h4>Top 100 Nhạc EDM Việt</h4></div>
                <div class="square" id="zing-chart"><h4>#zing-chart</h4></div>
                <div class="square" id="co-phong"><h4>Nhạc Cổ Phong Trung Hoa</h4></div>
                <div class="square" id="nhac-tre"><h4>Top 100 Nhạc Trẻ</h4></div>
                <div class="square" id="nhac-hoa-ngu"><h4>Top 100 Nhạc Hoa Ngữ hay nhất</h4></div>
                <div class="square" id="bolero"><h4>The Best Of Bolero</h4></div>
            </div>
            <div id="part-3"></div>
        </div>
        <div id="top-bar">
            <i class="fa-solid fa-arrow-left"></i>
            <i class="fa-solid fa-arrow-right"></i> 
            <i class="fa-solid fa-magnifying-glass"></i>    
            <input type="text" placeholder="Tìm kiếm bài hát, nghệ sĩ, lời bài hát....">
            <i class="fa-solid fa-gear"></i>
            <i id="avatar-top-bar"></i>
        </div>
        <div id="bottom-bar">
            <div id="part-1">
                <video id="icon-music">
                    <source src="./zingmp3/video/China-P ♪-(240p).mp4">
                </video>
                <i class="fa-regular fa-heart circle"></i>
                <i class="fa-solid fa-ellipsis circle"></i>
            </div>
            <div id="part-2">
                <div id="remote-control-1">
                    <i class="fa-solid fa-backward-step circle"></i>
                    <i class="fa-solid fa-play play-bottom-bar boder-radius"></i>
                    <i class="fa-solid fa-pause pause-bottom-bar boder-radius"></i>
                    <i class="fa-solid fa-forward-step circle"></i>
                </div>
                <div id="remote-control-2">
                    <h5>00:00</h5>
                    <div id="bar"></div>
                    <h5>03:24</h5>
                </div>
            </div>
            <div id="part-3">
                <i class="fa-solid fa-microphone"></i>
                <i class="fa-solid fa-display"></i>
                <i class="fa-solid fa-volume-high"></i>
                <div><i class="fa-solid fa-list"></i></div>
            </div>
        </div>
        <script src="./zingmp3/zingmp3.js"></script>
    </div>
</body>
</html>
